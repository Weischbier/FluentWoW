name: Bug Report
description: Report a bug in FluentWoW
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below.

  - type: input
    id: wow-version
    attributes:
      label: WoW Version
      description: What version of WoW are you running?
      placeholder: "11.0.2 (The War Within)"
    validations:
      required: true

  - type: input
    id: FluentWoW-version
    attributes:
      label: FluentWoW Version
      description: What version of FluentWoW? (check TOC or /run print(FluentWoW.version))
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: control
    attributes:
      label: Affected Control
      description: Which control is affected?
      options:
        - Button
        - CheckBox
        - ComboBox
        - ContentDialog
        - Expander
        - InfoBar
        - ProgressBar
        - RadioButton
        - ScrollFrame
        - Slider
        - TabView
        - TextBlock
        - TextBox
        - ToggleSwitch
        - SettingsCard
        - SettingsExpander
        - StackLayout
        - Motion
        - Tokens/Registry
        - Core/Bootstrap
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Message
      description: Paste any Lua error message (from BugSack, !BugGrabber, or error frame).
      render: text

  - type: checkboxes
    id: combat
    attributes:
      label: Combat Context
      options:
        - label: Issue occurs during combat
        - label: Issue occurs outside combat
